lexik_jwt_authentication:
    secret_key: '%env(JWT_SECRET)%'
    public_key: ~
    pass_phrase: ~
    encoder:
        signature_algorithm: 'HS256'
    token_ttl: '%env(int:JWT_TTL)%'

    token_extractors:
        authorization_header:
            enabled: true
            prefix: Bearer
            name: Authorization
        cookie:
            enabled: false
        query_parameter:
            enabled: false
